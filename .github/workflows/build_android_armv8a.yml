name: Build Android arm64-v8a

env:
  FLUTTER_VERSION: "3.38.5"

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub Release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag, for example v1.0.0"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark release as pre-release"
        required: false
        default: false
        type: boolean

jobs:
  android_arm64_v8a:
    name: Build Android arm64-v8a
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Inject fallback secret
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: Resolve version
        shell: bash
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ "${{ github.event.inputs.publish_release }}" != "true" ]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${VERSION}_${SHORT_SHA}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION resolved to $VERSION"

      - name: Configure Android signing
        shell: bash
        run: |
          cp TestKey.jks android/app/key.jks
          cat > android/key.properties <<'EOF'
          storeFile=key.jks
          storePassword=123321
          keyAlias=Test
          keyPassword=123321
          EOF

      - name: Build Android arm64-v8a APK
        shell: bash
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/flutter-apk/Kelivo_android_${VERSION}_arm64-v8a.apk

      - name: Publish GitHub Release
        if: ${{ github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: build/app/outputs/flutter-apk/Kelivo_android_*_arm64-v8a.apk

      - name: Upload Android arm64-v8a artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-arm64-v8a
          path: build/app/outputs/flutter-apk/Kelivo_android_*_arm64-v8a.apk
